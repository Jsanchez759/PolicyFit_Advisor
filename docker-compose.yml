version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: policyfit-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - LLM_API_KEY=${LLM_API_KEY:-}
    volumes:
      - ./backend/app:/app/app
      - ./backend/main.py:/app/main.py
      - ./uploads:/app/uploads
    networks:
      - policyfit-network
    depends_on:
      - frontend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: policyfit-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    networks:
      - policyfit-network

networks:
  policyfit-network:
    driver: bridge

volumes:
  uploads:
